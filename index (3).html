<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abdullah Hasan Nayem</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
    body{
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(270deg,#ff6ec4,#7873f5,#4ade80,#22d3ee);
      background-size:800% 800%;
      animation:gradientBG 12s ease infinite;
      color:white;
    }

    @keyframes gradientBG{
      0%{background-position:0% 50%}
      50%{background-position:100% 50%}
      100%{background-position:0% 50%}
    }

    .card{
      backdrop-filter: blur(15px);
      background: rgba(255,255,255,0.1);
      border-radius:20px;
      padding:40px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
      animation:fadeIn 1.5s ease;
    }

    @keyframes fadeIn{
      from{opacity:0;transform:translateY(20px)}
      to{opacity:1;transform:translateY(0)}
    }

    h1{
      font-size:2.5rem;
      margin-bottom:10px;
    }

    p{
      margin:8px 0;
      opacity:0.9;
    }

    .btn{
      margin-top:20px;
      padding:10px 20px;
      border:none;
      border-radius:25px;
      background:white;
      color:#333;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.1);
      background:#000;
      color:#fff;
    }

  </style>
</head>
<body>

  <div class="card">
    <h1>Abdullah Hasan Nayem</h1>
    <p>📍 Pabna, Bangladesh</p>
    <p>💻 IT& Student</p>
    <p>📧 abdullahhasannayem@yahoo.com</p>

    <button class="btn" onclick="copyEmail()">Copy Email</button>
  </div>

  <script>
    function copyEmail(){
      navigator.clipboard.writeText('abdullahhasannayem@yahoo.com');
      alert('Email copied!');
    }
  </script>

</body>
</html>
